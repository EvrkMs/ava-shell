name: Edge CI/CD (Traefik)

on:
  pull_request:
    paths:
      - "traefik/docker-compose.yml"
      - "traefik/dynamic/**"
      - "traefik/templates/**"
      - "scripts/edge/**"
      - ".github/workflows/traefik.yml"
  push:
    branches:
      - master
    paths:
      - "traefik/docker-compose.yml"
      - "traefik/dynamic/**"
      - "traefik/templates/**"
      - "scripts/edge/**"
      - ".github/workflows/traefik.yml"
  workflow_dispatch:

concurrency:
  group: edge-traefik-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-ci:
    name: Validate Traefik Edge
    runs-on:
      - label-ci
    env:
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || vars['root-domain'] || 'ava-shell.ru' }}
      COMPOSE_FILE: ${{ github.workspace }}/traefik/docker-compose.yml
      COMPOSE_PROJECT_NAME: ava_shell_edge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render CI routes
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/edge/render-routes.sh \
            traefik/templates/routes.ci.yml \
            traefik/dynamic/routes.generated.yml \
            "${ROOT_DOMAIN}"

      - name: Start edge stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" up -d --force-recreate
          bash scripts/edge/check-compose-running.sh "${COMPOSE_FILE}"

      - name: Wait for edge HTTPS port
        shell: bash
        run: |
          bash scripts/edge/wait-https.sh "${ROOT_DOMAIN}"

      - name: HTTPS smoke check (root domain)
        shell: bash
        run: |
          bash scripts/edge/check-root-response.sh "${ROOT_DOMAIN}"

      - name: Unavailable auth backend returns 502/503 (edge stays alive)
        shell: bash
        run: |
          bash scripts/edge/check-auth-unavailable.sh "${ROOT_DOMAIN}"

      - name: Check HTTP to HTTPS redirect (80 -> 443)
        shell: bash
        run: |
          bash scripts/edge/check-http-redirect.sh "${ROOT_DOMAIN}"

      - name: Ensure edge container is still running
        shell: bash
        run: |
          bash scripts/edge/check-compose-running.sh "${COMPOSE_FILE}"

      - name: Show edge logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 edge || true

      - name: Full cleanup
        if: always()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" down --remove-orphans --volumes || true

  deploy-dev:
    name: Deploy Traefik Edge to Dev
    needs: edge-ci
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    environment: dev-shell
    env:
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || vars['root-domain'] || 'ava-shell.ru' }}
      LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
      CF_DNS_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
      COMPOSE_FILE: ${{ github.workspace }}/traefik/docker-compose.yml
      COMPOSE_PROJECT_NAME: ava_shell_edge
    runs-on:
      - label-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy env
        shell: bash
        run: |
          bash scripts/edge/validate-deploy-env.sh

      - name: Render deploy routes
        shell: bash
        run: |
          bash scripts/edge/render-routes.sh \
            traefik/templates/routes.deploy.yml \
            traefik/dynamic/routes.generated.yml \
            "${ROOT_DOMAIN}"

      - name: Ensure ACME storage exists
        shell: bash
        run: |
          bash scripts/edge/ensure-acme-storage.sh ava_shell_traefik_acme

      - name: Deploy edge stack
        shell: bash
        run: |
          bash scripts/edge/deploy-compose.sh "${COMPOSE_FILE}"

      - name: Wait for HTTPS
        shell: bash
        run: |
          bash scripts/edge/wait-https.sh "${ROOT_DOMAIN}"

      - name: Post-deploy check (root endpoint)
        shell: bash
        run: |
          bash scripts/edge/check-root-response.sh "${ROOT_DOMAIN}"

      - name: Post-deploy check (auth backend unavailable -> 502/503)
        shell: bash
        run: |
          bash scripts/edge/check-auth-unavailable.sh "${ROOT_DOMAIN}"

      - name: Show edge logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 edge || true
