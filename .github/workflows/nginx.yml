name: Edge CI/CD (Traefik)

on:
  pull_request:
    paths:
      - "nginx/docker-compose.yml"
      - "nginx/traefik/**"
      - ".github/workflows/nginx.yml"
  push:
    branches:
      - master
    paths:
      - "nginx/docker-compose.yml"
      - "nginx/traefik/**"
      - ".github/workflows/nginx.yml"
  workflow_dispatch:

concurrency:
  group: edge-traefik-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-ci:
    name: Validate Traefik Edge
    runs-on:
      - label-ci
    env:
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || vars['root-domain'] || 'ava-shell.ru' }}
      COMPOSE_FILE: ${{ github.workspace }}/nginx/docker-compose.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CI dynamic routes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p nginx/traefik/dynamic
          cat > nginx/traefik/dynamic/routes.generated.yml <<EOF
          http:
            routers:
              root-router:
                entryPoints: ["websecure"]
                rule: "Host(\`${ROOT_DOMAIN}\`)"
                service: root-service
                tls: {}
              auth-router:
                entryPoints: ["websecure"]
                rule: "Host(\`auth.${ROOT_DOMAIN}\`)"
                service: auth-service
                tls: {}
            services:
              root-service:
                loadBalancer:
                  servers:
                    - url: "http://root-echo:5678"
              auth-service:
                loadBalancer:
                  servers:
                    - url: "http://auth-admin:5000"
          EOF

      - name: Start edge stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" up -d --force-recreate
          docker compose -f "${COMPOSE_FILE}" ps

      - name: HTTPS smoke check (root domain)
        shell: bash
        run: |
          set -euo pipefail
          body="$(curl --silent --show-error --fail -k \
            --resolve "${ROOT_DOMAIN}:443:127.0.0.1" \
            "https://${ROOT_DOMAIN}/" | tr -d '\r\n')"
          if [ "${body}" != "true" ]; then
            echo "Expected root response 'true', got: ${body}"
            exit 1
          fi

      - name: Unavailable auth backend returns 502/503 (edge stays alive)
        shell: bash
        run: |
          set -euo pipefail
          status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' -k \
            --resolve "auth.${ROOT_DOMAIN}:443:127.0.0.1" \
            "https://auth.${ROOT_DOMAIN}/")"
          case "${status_code}" in
            502|503) echo "Expected backend failure status: ${status_code}" ;;
            *) echo "Expected 502/503 for unavailable auth backend, got ${status_code}"; exit 1 ;;
          esac

      - name: Check HTTP to HTTPS redirect (80 -> 443)
        shell: bash
        run: |
          set -euo pipefail
          location="$(curl --silent --show-error --output /dev/null --write-out '%{redirect_url}' \
            --resolve "${ROOT_DOMAIN}:80:127.0.0.1" \
            "http://${ROOT_DOMAIN}/")"
          if [ "${location}" != "https://${ROOT_DOMAIN}/" ]; then
            echo "Expected redirect to https://${ROOT_DOMAIN}/, got: ${location}"
            exit 1
          fi

      - name: Ensure edge container is still running
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" ps
          running_count="$(docker compose -f "${COMPOSE_FILE}" ps --status running --services | wc -l)"
          if [ "${running_count}" -lt 1 ]; then
            echo "Traefik edge is not running."
            exit 1
          fi

      - name: Show edge logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 traefik || true

      - name: Full cleanup
        if: always()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" down --remove-orphans --volumes || true
          docker rm -f ava-shell-edge ava-shell-root-echo || true

  deploy-dev:
    name: Deploy Edge to Dev
    needs: edge-ci
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    environment: dev-shell
    env:
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || vars['root-domain'] || 'ava-shell.ru' }}
      LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
      CF_DNS_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
    runs-on:
      - label-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy env
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CF_DNS_API_TOKEN:-}" ]; then
            echo "Missing secret: CF_DNS_API_TOKEN (Environment: dev-shell)"
            exit 1
          fi
          if [ -z "${LETSENCRYPT_EMAIL:-}" ]; then
            echo "Missing variable: LETSENCRYPT_EMAIL (Environment: dev-shell)"
            exit 1
          fi
          mkdir -p traefik/dynamic

      - name: Generate deploy dynamic routes
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          cat > traefik/dynamic/routes.generated.yml <<EOF
          http:
            routers:
              root-router:
                entryPoints: ["websecure"]
                rule: "Host(\`${ROOT_DOMAIN}\`)"
                service: root-service
                tls:
                  certResolver: cloudflare
              auth-router:
                entryPoints: ["websecure"]
                rule: "Host(\`auth.${ROOT_DOMAIN}\`)"
                service: auth-service
                tls:
                  certResolver: cloudflare
            services:
              root-service:
                loadBalancer:
                  servers:
                    - url: "http://root-echo:5678"
              auth-service:
                loadBalancer:
                  servers:
                    - url: "http://auth-admin:5000"
          EOF

      - name: Ensure ACME storage exists
        shell: bash
        run: |
          set -euo pipefail
          docker volume create ava_shell_traefik_acme >/dev/null
          docker run --rm -v ava_shell_traefik_acme:/acme alpine:3.20 \
            sh -c "touch /acme/acme.json && chmod 600 /acme/acme.json"

      - name: Deploy edge stack
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d
          docker compose ps

      - name: Post-deploy check (root endpoint)
        shell: bash
        run: |
          set -euo pipefail
          ok=0
          for i in $(seq 1 30); do
            body="$(curl --silent --show-error -k \
              --resolve "${ROOT_DOMAIN}:443:127.0.0.1" \
              "https://${ROOT_DOMAIN}/" | tr -d '\r\n' || true)"
            if [ "${body}" = "true" ]; then
              ok=1
              break
            fi
            sleep 2
          done
          if [ "${ok}" -ne 1 ]; then
            echo "Root endpoint did not become healthy in time."
            exit 1
          fi

      - name: Post-deploy check (auth backend unavailable -> 502/503)
        shell: bash
        run: |
          set -euo pipefail
          status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' -k \
            --resolve "auth.${ROOT_DOMAIN}:443:127.0.0.1" \
            "https://auth.${ROOT_DOMAIN}/")"
          case "${status_code}" in
            502|503) echo "Expected status for unavailable auth backend: ${status_code}" ;;
            *) echo "Expected 502/503, got ${status_code}"; exit 1 ;;
          esac
