name: Nginx CI

on:
  pull_request:
    paths:
      - "nginx/nginx.conf"
      - "nginx/docker-compose.yml"
      - "nginx/conf.d/**"
      - "nginx/snippets/**"
      - "nginx/certbot/**"
      - ".github/workflows/nginx.yml"
  push:
    branches:
      - master
    paths:
      - "nginx/nginx.conf"
      - "nginx/docker-compose.yml"
      - "nginx/conf.d/**"
      - "nginx/snippets/**"
      - "nginx/certbot/**"
      - ".github/workflows/nginx.yml"
  workflow_dispatch:

concurrency:
  group: nginx-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nginx-ci:
    name: Validate Nginx HTTPS
    runs-on:
      -  label-ci
    env:
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || vars['root-domain'] || 'ava-shell.ru' }}
      COMPOSE_FILE: ${{ github.workspace }}/nginx/docker-compose.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare folders
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p nginx/certs nginx/conf.d

      - name: Generate temporary certificate for CI
        shell: bash
        run: |
          set -euo pipefail
          openssl req -x509 -nodes -newkey rsa:2048 -sha256 -days 2 \
            -keyout nginx/certs/privkey.pem \
            -out nginx/certs/fullchain.pem \
            -subj "/CN=${ROOT_DOMAIN}" \
            -addext "subjectAltName=DNS:${ROOT_DOMAIN},DNS:*.${ROOT_DOMAIN}"

      - name: Generate CI server config
        shell: bash
        run: |
          set -euo pipefail
          cat > nginx/conf.d/00-ci-smoke.conf <<EOF
          server {
            listen 443 ssl;
            listen [::]:443 ssl;
            server_name ${ROOT_DOMAIN} auth.${ROOT_DOMAIN} admin.${ROOT_DOMAIN};

            ssl_certificate /etc/nginx/certs/fullchain.pem;
            ssl_certificate_key /etc/nginx/certs/privkey.pem;
            ssl_protocols TLSv1.2 TLSv1.3;

            location = /healthz {
              default_type text/plain;
              return 200 "ok\n";
            }

            location / {
              default_type text/plain;
              return 200 "nginx-ci\n";
            }

            # CI check: unavailable upstream should return 502, not crash nginx.
            location = /upstream-down {
              proxy_pass http://127.0.0.1:65535;
            }
          }
          EOF

      - name: Start nginx stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" up -d --force-recreate
          docker compose -f "${COMPOSE_FILE}" ps

      - name: Validate nginx config in container
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" exec -T nginx nginx -t

      - name: Capture container id before reload
        shell: bash
        run: |
          set -euo pipefail
          cid_before="$(docker compose -f "${COMPOSE_FILE}" ps -q nginx)"
          if [ -z "${cid_before}" ]; then
            echo "Unable to detect nginx container id."
            exit 1
          fi
          echo "NGINX_CID_BEFORE=${cid_before}" >> "${GITHUB_ENV}"

      - name: HTTPS smoke check (base domain)
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --resolve "${ROOT_DOMAIN}:443:127.0.0.1" \
            --cacert nginx/certs/fullchain.pem \
            "https://${ROOT_DOMAIN}/healthz"

      - name: Auth domain returns 502 when backend is absent
        shell: bash
        run: |
          set -euo pipefail
          status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --resolve "auth.${ROOT_DOMAIN}:443:127.0.0.1" \
            --cacert nginx/certs/fullchain.pem \
            "https://auth.${ROOT_DOMAIN}/healthz")"

          if [ "${status_code}" != "502" ]; then
            echo "Expected 502 for auth domain without backend, got ${status_code}"
            exit 1
          fi

      - name: Check HTTP to HTTPS redirect (80 -> 443)
        shell: bash
        run: |
          set -euo pipefail
          location="$(curl --silent --show-error --output /dev/null --write-out '%{redirect_url}' \
            --resolve "${ROOT_DOMAIN}:80:127.0.0.1" \
            "http://${ROOT_DOMAIN}/healthz")"

          if [ "${location}" != "https://${ROOT_DOMAIN}/healthz" ]; then
            echo "Expected redirect to https://${ROOT_DOMAIN}/healthz, got: ${location}"
            exit 1
          fi

      - name: Check unavailable upstream returns 502
        shell: bash
        run: |
          set -euo pipefail
          status_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --resolve "${ROOT_DOMAIN}:443:127.0.0.1" \
            --cacert nginx/certs/fullchain.pem \
            "https://${ROOT_DOMAIN}/upstream-down")"

          if [ "${status_code}" != "502" ]; then
            echo "Expected status 502 for unavailable upstream, got ${status_code}"
            exit 1
          fi

      - name: Check nginx is still running after 502 probe
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" ps
          running_count="$(docker compose -f "${COMPOSE_FILE}" ps --status running --services | wc -l)"
          if [ "${running_count}" -lt 1 ]; then
            echo "Nginx container is not running after upstream-down probe."
            exit 1
          fi

      - name: Reload nginx and verify no container restart
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f "${COMPOSE_FILE}" exec -T nginx nginx -s reload
          sleep 1
          cid_after="$(docker compose -f "${COMPOSE_FILE}" ps -q nginx)"
          if [ -z "${cid_after}" ]; then
            echo "Unable to detect nginx container id after reload."
            exit 1
          fi
          if [ "${NGINX_CID_BEFORE}" != "${cid_after}" ]; then
            echo "Container id changed after reload: ${NGINX_CID_BEFORE} -> ${cid_after}"
            echo "Expected nginx reload without container restart."
            exit 1
          fi

      - name: Show nginx logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 nginx || true

      - name: Full cleanup
        if: always()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" down --remove-orphans --volumes || true
          docker rm -f ava-shell-nginx || true

  deploy-dev:
    name: Deploy Nginx to Dev
    needs: nginx-ci
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    environment: dev-shell
    env:
      ROOT_DOMAIN: ${{ vars.ROOT_DOMAIN || vars['root-domain'] || 'ava-shell.ru' }}
      LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
      CF_DNS_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
      NGINX_STATE_DIR: ${{ vars.NGINX_STATE_DIR || '/home/evrk/ava-shell-state/nginx' }}
    runs-on:
      - label-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy env
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CF_DNS_API_TOKEN:-}" ]; then
            echo "Missing secret: CF_DNS_API_TOKEN (Environment: dev)"
            exit 1
          fi
          if [ -z "${LETSENCRYPT_EMAIL:-}" ]; then
            echo "Missing variable: LETSENCRYPT_EMAIL (Environment: dev)"
            exit 1
          fi
          CERTBOT_STATE_DIR="${NGINX_STATE_DIR}/certbot"
          NGINX_CERTS_DIR="${NGINX_STATE_DIR}/certs"
          mkdir -p "${CERTBOT_STATE_DIR}" "${NGINX_CERTS_DIR}" "${CERTBOT_STATE_DIR}/work" "${CERTBOT_STATE_DIR}/logs"
          echo "CERTBOT_STATE_DIR=${CERTBOT_STATE_DIR}" >> "${GITHUB_ENV}"
          echo "NGINX_CERTS_DIR=${NGINX_CERTS_DIR}" >> "${GITHUB_ENV}"

      - name: Issue or renew certificate via certbot
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          export LOCAL_UID="$(id -u)"
          export LOCAL_GID="$(id -g)"
          printf "dns_cloudflare_api_token = %s\n" "$CF_DNS_API_TOKEN" > "${CERTBOT_STATE_DIR}/.cloudflare.ini"
          chmod 600 "${CERTBOT_STATE_DIR}/.cloudflare.ini"

          if [ -f "${CERTBOT_STATE_DIR}/live/${ROOT_DOMAIN}/fullchain.pem" ] && [ -f "${CERTBOT_STATE_DIR}/live/${ROOT_DOMAIN}/privkey.pem" ]; then
            echo "Existing cert found for ${ROOT_DOMAIN}. Running renew."
            docker compose --profile certbot run --rm certbot renew \
              --dns-cloudflare \
              --dns-cloudflare-propagation-seconds 120 \
              --dns-cloudflare-credentials /etc/letsencrypt/.cloudflare.ini \
              --config-dir /etc/letsencrypt \
              --work-dir /etc/letsencrypt/work \
              --logs-dir /etc/letsencrypt/logs
          else
            echo "No cert found for ${ROOT_DOMAIN}. Issuing new certificate."
            docker compose --profile certbot run --rm certbot certonly \
              --dns-cloudflare \
              --dns-cloudflare-propagation-seconds 30 \
              --dns-cloudflare-credentials /etc/letsencrypt/.cloudflare.ini \
              --config-dir /etc/letsencrypt \
              --work-dir /etc/letsencrypt/work \
              --logs-dir /etc/letsencrypt/logs \
              --email "${LETSENCRYPT_EMAIL}" \
              --agree-tos \
              --no-eff-email \
              -d "${ROOT_DOMAIN}" \
              -d "*.${ROOT_DOMAIN}"
          fi

      - name: Sync certificate files for nginx
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          cp "${CERTBOT_STATE_DIR}/live/${ROOT_DOMAIN}/fullchain.pem" "${NGINX_CERTS_DIR}/fullchain.pem"
          cp "${CERTBOT_STATE_DIR}/live/${ROOT_DOMAIN}/privkey.pem" "${NGINX_CERTS_DIR}/privkey.pem"
          chmod 600 "${NGINX_CERTS_DIR}/privkey.pem"
          chmod 644 "${NGINX_CERTS_DIR}/fullchain.pem"

      - name: Deploy nginx stack
        working-directory: nginx
        shell: bash
        run: |
          set -euo pipefail
          docker compose up -d

          # Prefer graceful config apply first.
          if docker exec ava-shell-nginx nginx -t && docker exec ava-shell-nginx nginx -s reload; then
            echo "Graceful reload succeeded."
          else
            echo "Reload path failed. Falling back to force recreate."
            docker compose up -d --force-recreate
            docker exec ava-shell-nginx nginx -t
          fi

          docker compose ps

      - name: Cleanup certbot credentials
        if: always()
        working-directory: nginx
        shell: bash
        run: rm -f "${CERTBOT_STATE_DIR}/.cloudflare.ini"
