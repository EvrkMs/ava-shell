name: DB Entry CI/CD (PgBouncer + HAProxy)

on:
  pull_request:
    paths:
      - "database/**"
      - "scripts/db/**"
      - ".github/workflows/db-proxy.yml"
  push:
    branches:
      - master
    paths:
      - "database/**"
      - "scripts/db/**"
      - ".github/workflows/db-proxy.yml"
  workflow_dispatch:

concurrency:
  group: db-proxy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-proxy-ci:
    name: Validate DB Entry
    runs-on:
      - label-ci
    env:
      COMPOSE_FILE: ${{ github.workspace }}/database/docker-compose.yml
      COMPOSE_PROJECT_NAME: ava_shell_db_proxy
      DB_BACKENDS: "127.0.0.1:5432"
      DB_PROXY_PORT: "15432"
      DB_NAMES: "AUTH"
      DB_NAME_AUTH: "ava_auth"
      PGBOUNCER_AUTH_USER: "pgbouncer_auth"
      PGBOUNCER_AUTH_PASSWORD: "pgbouncer_auth_dev"
      PGBOUNCER_AUTH_DBNAME: "ava_auth"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate DB_BACKENDS
        shell: bash
        run: |
          bash scripts/db/validate-db-backends.sh "${DB_BACKENDS}"

      - name: Validate PgBouncer env
        shell: bash
        run: |
          bash scripts/db/validate-pgbouncer-env.sh

      - name: Render HAProxy config
        shell: bash
        run: |
          bash scripts/db/render-haproxy-cfg.sh database/haproxy/haproxy.cfg
          sed -n '1,200p' database/haproxy/haproxy.cfg

      - name: Render PgBouncer config
        shell: bash
        run: |
          bash scripts/db/render-pgbouncer-config.sh \
            database/pgbouncer/pgbouncer.ini \
            database/pgbouncer/userlist.txt
          sed -n '1,200p' database/pgbouncer/pgbouncer.ini

      - name: Validate HAProxy config syntax
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/database/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro" \
            haproxy:3.0-alpine \
            haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg

      - name: Start DB entry stack
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" up -d --force-recreate
          docker compose -f "${COMPOSE_FILE}" ps

      - name: Validate HAProxy config in running container
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" exec -T db-proxy \
            haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg

      - name: Validate PgBouncer config files in running container
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" exec -T db-entry sh -lc '
            test -f /etc/pgbouncer/pgbouncer.ini &&
            test -f /etc/pgbouncer/userlist.txt
          '

      - name: Show logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 db-proxy || true
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 db-entry || true

      - name: Full cleanup
        if: always()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" down --remove-orphans --volumes || true

  patroni-api-mock-ci:
    name: Validate Patroni API Checks (Mock)
    runs-on:
      - label-ci
    env:
      MOCK_NETWORK: ava-shell-db-proxy-mock
      HAPROXY_HEALTH_MODE: patroni-api
      DB_BACKENDS: "pg-primary:5432,pg-replica:5432"
      PATRONI_API_PORT: "8008"
      PATRONI_CHECK_PATH: "/primary"
      MOCK_PROXY_PORT: "15433"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render HAProxy config (patroni-api mode)
        shell: bash
        run: |
          bash scripts/db/render-haproxy-cfg.sh database/haproxy/haproxy.cfg
          sed -n '1,220p' database/haproxy/haproxy.cfg

      - name: Start mock Patroni nodes
        shell: bash
        run: |
          set -euo pipefail
          docker network create "${MOCK_NETWORK}" >/dev/null 2>&1 || true

          run_mock_node() {
            local name="$1"
            local role="$2"
            docker rm -f "${name}" >/dev/null 2>&1 || true
            docker run -d \
              --name "${name}" \
              --network "${MOCK_NETWORK}" \
              -e ROLE="${role}" \
              -v "${GITHUB_WORKSPACE}/scripts/db/mock_patroni_node.py:/opt/mock_patroni_node.py:ro" \
              python:3.12-alpine \
              python /opt/mock_patroni_node.py
          }

          run_mock_node pg-primary primary
          run_mock_node pg-replica replica

      - name: Start HAProxy with rendered config
        shell: bash
        run: |
          set -euo pipefail
          docker rm -f db-proxy-mock >/dev/null 2>&1 || true
          docker run -d \
            --name db-proxy-mock \
            --network "${MOCK_NETWORK}" \
            -p "${MOCK_PROXY_PORT}:15432" \
            -v "${GITHUB_WORKSPACE}/database/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro" \
            haproxy:3.0-alpine

      - name: Validate routing goes to primary
        shell: bash
        run: |
          docker run --rm \
            --network host \
            -e MOCK_PROXY_PORT="${MOCK_PROXY_PORT}" \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            python:3.12-alpine \
            python /workspace/scripts/db/check_haproxy_primary.py

      - name: Show mock logs on failure
        if: failure()
        shell: bash
        run: |
          docker logs db-proxy-mock --tail 200 || true
          docker logs pg-primary --tail 100 || true
          docker logs pg-replica --tail 100 || true

      - name: Cleanup mock environment
        if: always()
        shell: bash
        run: |
          docker rm -f db-proxy-mock pg-primary pg-replica >/dev/null 2>&1 || true
          docker network rm "${MOCK_NETWORK}" >/dev/null 2>&1 || true

  deploy-dev:
    name: Deploy DB Entry to Dev
    needs:
      - db-proxy-ci
      - patroni-api-mock-ci
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    environment: dev-shell
    runs-on:
      - label-dev
    env:
      COMPOSE_FILE: ${{ github.workspace }}/database/docker-compose.yml
      COMPOSE_PROJECT_NAME: ava_shell_db_proxy
      DB_BACKENDS: ${{ vars.DB_BACKENDS }}
      DB_PROXY_PORT: "5432"
      DB_NAMES: ${{ vars.DB_NAMES }}
      PGBOUNCER_AUTH_USER: ${{ vars.PGBOUNCER_AUTH_USER }}
      PGBOUNCER_AUTH_PASSWORD: ${{ secrets.PGBOUNCER_AUTH_PASSWORD }}
      PGBOUNCER_AUTH_DBNAME: ${{ vars.PGBOUNCER_AUTH_DBNAME }}
      GITHUB_VARS_JSON: ${{ toJson(vars) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export DB_NAME_* variables
        shell: bash
        run: |
          docker run --rm \
            -e DB_NAMES="${DB_NAMES}" \
            -e GITHUB_VARS_JSON="${GITHUB_VARS_JSON}" \
            -e GITHUB_ENV=/github_env \
            -v "${GITHUB_ENV}:/github_env" \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            python:3.12-alpine \
            python /workspace/scripts/db/export_db_name_vars.py

      - name: Validate DB_BACKENDS
        shell: bash
        run: |
          bash scripts/db/validate-db-backends.sh "${DB_BACKENDS}"

      - name: Validate PgBouncer env
        shell: bash
        run: |
          bash scripts/db/validate-pgbouncer-env.sh

      - name: Render HAProxy config
        shell: bash
        run: |
          bash scripts/db/render-haproxy-cfg.sh database/haproxy/haproxy.cfg
          sed -n '1,200p' database/haproxy/haproxy.cfg

      - name: Render PgBouncer config
        shell: bash
        run: |
          bash scripts/db/render-pgbouncer-config.sh \
            database/pgbouncer/pgbouncer.ini \
            database/pgbouncer/userlist.txt
          sed -n '1,200p' database/pgbouncer/pgbouncer.ini

      - name: Validate HAProxy config syntax
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/database/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro" \
            haproxy:3.0-alpine \
            haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg

      - name: Deploy DB entry stack
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" up -d
          docker compose -f "${COMPOSE_FILE}" ps

      - name: Validate HAProxy config in running container
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" exec -T db-proxy \
            haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg

      - name: Validate PgBouncer config files in running container
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" exec -T db-entry sh -lc '
            test -f /etc/pgbouncer/pgbouncer.ini &&
            test -f /etc/pgbouncer/userlist.txt
          '

      - name: Show logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 db-proxy || true
          docker compose -f "${COMPOSE_FILE}" logs --no-color --tail=200 db-entry || true
