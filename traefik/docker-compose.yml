services:
  edge:
    image: traefik:v3.2
    container_name: ava-shell-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    command:
      - --log.level=INFO
      - --accesslog=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entryPoints.web.address=:80
      - --entryPoints.websecure.address=:443
      - --entryPoints.websecure.http.tls=true
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.cloudflare.acme.email=${LETSENCRYPT_EMAIL:-ops@ava-shell.ru}
      - --certificatesresolvers.cloudflare.acme.storage=/etc/traefik/acme/acme.json
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.dnschallenge.delaybeforecheck=30
      - --certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
    volumes:
      - ./dynamic:/etc/traefik/dynamic:ro
      - ava_shell_traefik_acme:/etc/traefik/acme
    networks:
      - edge

  root-echo:
    image: hashicorp/http-echo:1.0.0
    container_name: ava-shell-root-echo
    command: ["-text=true", "-listen=:5678"]
    restart: unless-stopped
    networks:
      - edge

volumes:
  ava_shell_traefik_acme:
    name: ava_shell_traefik_acme

networks:
  edge:
    name: ava-shell-edge

