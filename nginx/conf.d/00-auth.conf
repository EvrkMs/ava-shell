upstream auth_admin_backend {
  # Backend service (may be unavailable in early stages; nginx should return 502).
  server auth-admin:5000;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name auth.ava-shell.ru;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location / {
    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass http://auth_admin_backend;
  }
}
