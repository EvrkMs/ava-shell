server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name auth.ava-shell.ru;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location / {
    # Resolve backend at request time via Docker DNS.
    # If backend is missing/unavailable, nginx should return 502 but stay alive.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $auth_admin_backend http://auth-admin:5000;

    include /etc/nginx/snippets/proxy-common.conf;
    proxy_pass $auth_admin_backend;
  }
}
