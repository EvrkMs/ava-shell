worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  # Compression
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  # QUIC/HTTP3 note:
  # If nginx is behind Cloudflare Proxy (orange cloud), clients negotiate HTTP/3 with Cloudflare.
  # In this setup HTTP/3 on origin nginx is typically unnecessary.
  # Enable QUIC only if clients connect directly to this nginx instance.

  # Supports both flat and grouped config layouts:
  # - /etc/nginx/conf.d/*.conf
  # - /etc/nginx/conf.d/*/*.conf
  include /etc/nginx/conf.d/*.conf;
  include /etc/nginx/conf.d/*/*.conf;
}
