services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ava-shell-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./snippets:/etc/nginx/snippets:ro
      - ava_shell_nginx_certs:/etc/nginx/certs:ro

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: ava-shell-certbot
    profiles:
      - certbot
    volumes:
      - ava_shell_certbot_state:/etc/letsencrypt
      - ava_shell_nginx_certs:/etc/nginx/certs
      - ./runtime:/runtime

volumes:
  ava_shell_nginx_certs:
    name: ava_shell_nginx_certs
  ava_shell_certbot_state:
    name: ava_shell_certbot_state
