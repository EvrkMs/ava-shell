services:
  db-proxy:
    image: haproxy:3.0-alpine
    container_name: ava-shell-db-proxy
    restart: unless-stopped
    ports:
      - "${DB_PROXY_PORT:-5432}:5432"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - db-edge

networks:
  db-edge:
    name: ava-shell-db-edge
