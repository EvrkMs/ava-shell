global
  log stdout format raw local0
  maxconn 2000

defaults
  log global
  mode tcp
  option tcplog
  timeout connect 5s
  timeout client 60s
  timeout server 60s

frontend postgres_rw
  bind *:15432
  default_backend postgres_rw_backends

backend postgres_rw_backends
  balance first
  option httpchk GET /primary
  http-check expect status 200
  server pg1 10.0.0.11:5432 check port 8008
  server pg2 10.0.0.12:5432 check port 8008

